name: Publish package to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run all publish checks without publishing to npm"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify manual dispatch source
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ] && ! [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "Manual npm publish runs must target main or a v* tag. Current ref: ${GITHUB_REF}."
            exit 1
          fi

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "v${PACKAGE_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version v${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Verify package version is unpublished
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published on npm."
            exit 1
          fi

      - name: Rebuild package payload
        run: npm run build:assets

      - name: Check package manifest drift
        run: npm run check:package-manifest

      - name: Run tests
        run: npm test

      - name: Smoke-test package contents
        run: npm pack --dry-run

      - name: Verify npm trusted publishing OIDC
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run == false
        run: |
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "GitHub Actions did not provide an OIDC token request endpoint."
            echo "Check that this workflow has 'permissions: id-token: write' on the ref being published."
            exit 1
          fi

      - name: Publish to npm
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run == false
        run: npm publish --access public
