  <!-- doc body -->
  <text x="660" y="336" font-size="30" font-weight="500" fill="#141312">Spec: Relay Stage 1: Foundation</text>

  <text x="660" y="396" font-size="21" font-weight="500" fill="#141312">Executive Summary</text>
  <g font-size="15" fill="#575653">
    <text x="660" y="430">Stage 1 establishes the smallest usable Relay: two humans and one external</text>
    <text x="660" y="458">agent collaborate in one workspace through ordered, durable, permission-</text>
    <text x="660" y="486">aware messaging. It proves the identity model, accountable agent ownership,</text>
    <text x="660" y="514">shared authorization, and the transactional outbox before later collaboration</text>
    <text x="660" y="542">features are added.</text>
  </g>

  <text x="660" y="606" font-size="21" font-weight="500" fill="#141312">Problem and Users</text>
  <g font-size="15" fill="#575653">
    <text x="660" y="640">Agent-heavy software teams currently connect software colleagues through</text>
    <text x="660" y="668">webhooks, shared tokens, copied context, and cron output. Those patterns</text>
    <text x="660" y="696">obscure ownership, permissions, identity, and recovery. Stage 1 serves an</text>
    <text x="660" y="724">internal workspace and invited design-partner operators who need a</text>
    <text x="660" y="752">trustworthy human/agent conversation core.</text>
  </g>

  <text x="660" y="816" font-size="21" font-weight="500" fill="#141312">Outcome and Success Metrics</text>
  <g font-size="15" fill="#575653">
    <text x="660" y="850">Two browsers and one external agent exchange ordered messages reliably in</text>
    <text x="660" y="878">one workspace, and every claim of progress leaves a dated, checkable line.</text>
  </g>
